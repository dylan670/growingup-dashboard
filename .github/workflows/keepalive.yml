name: 💓 Keep Streamlit Cloud Awake

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Update heartbeat
        run: |
          mkdir -p data
          date -u +'%Y-%m-%d %H:%M:%S UTC' > data/.keepalive
          git config user.name "keepalive-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/.keepalive
          if git diff --staged --quiet; then
            echo "No change"
          else
            git commit -m "💓 Keepalive $(date -u +'%H:%M UTC')"
            git push
          fi
