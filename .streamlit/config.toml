[theme]
# 그로잉업팀 브랜드 테마 — 신뢰감 있는 블루 기반
primaryColor = "#2563eb"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8fafc"
textColor = "#0f172a"
font = "sans serif"

[server]
# 외부 접근 허용 — 같은 WiFi 안의 다른 PC/모바일에서 http://<PC_IP>:8501 로 접속 가능
address = "0.0.0.0"
port = 8501
headless = true
runOnSave = true
maxUploadSize = 50
# 브라우저 자동 열기 방지 (서버용)
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
# 모바일에서 접근 시 HTTPS/HTTP 혼동 방지
serverAddress = "localhost"
serverPort = 8501
